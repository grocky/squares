{{if .Games}}
{{range .Games}}
<div class="game {{.Status}}">
    <span class="teams">{{.AwayTeam}} @ {{.HomeTeam}}</span>
    {{if eq .Status "scheduled"}}
    <span class="score">{{formatTime .StartTime "Mon Jan 2, 3:04 PM"}}</span>
    {{else}}
    <span class="score">{{.WinnerScore}} – {{.LoserScore}}</span>
    {{end}}
    <span class="status-badge">{{.Status}}</span>
</div>
{{end}}
{{else}}
<p class="muted">No games synced yet.</p>
{{end}}
