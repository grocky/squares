{{define "admin_login"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Squares</title>
    <script src="/vendor/tailwindcss@3.4.17.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans leading-relaxed min-h-screen flex items-center justify-center">
    <div class="w-full max-w-sm mx-auto">
        <div class="bg-white border border-gray-200 rounded-lg shadow-sm p-8">
            <h1 class="text-2xl font-bold text-gray-900 mb-6 text-center">Admin Access</h1>
            {{if .}}
            <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded text-red-700 text-sm">
                Invalid token. Please try again.
            </div>
            {{end}}
            <form method="POST" action="/admin/login">
                <label for="token" class="block text-sm font-medium text-gray-600 mb-2">Token</label>
                <input type="password" id="token" name="token" required autofocus
                       class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 mb-4">
                <button type="submit"
                        class="w-full bg-indigo-900 hover:bg-indigo-800 text-white text-sm font-semibold px-5 py-2.5 rounded-md cursor-pointer">
                    Sign In
                </button>
            </form>
        </div>
    </div>
</body>
</html>
{{end}}
